    @media print{.hero,nav,.bottom,.toast{display:none} body{background:white} main{max-width:none}.tab{display:block}.card,details{box-shadow:none;break-inside:avoid}}

function slug(s){return s.toLowerCase().replace(/[^a-z0-9åäö]+/gi,'-')}
function render(){

 document.getElementById('strand').innerHTML=`<div class="card"><h2>🏖️ Strand & Gardaland</h2><p>Badskor är smart vid Gardasjön. Strandväskan kan vara färdigpackad redan hemifrån.</p></div><details open><summary>Strandväska</summary>${checklist('beach',beachList)}</details><details open><summary>Gardaland-checklista</summary>${checklist('gardaland',gardalandList)}</details>`;
 document.getElementById('karta').innerHTML=`<div class="card"><h2>🗺️ Karta</h2><p>Klistra in länken till er Google My Maps. Den sparas i appen på varje telefon.</p><input class="field" id="mapInput" placeholder="Google My Maps-länk"><br><br><a id="mapOpen" class="btn full" target="_blank">Öppna Google My Maps</a></div><div class="grid"><div class="card"><h3>🏨 Hotell</h3>${itinerary.filter((d,i)=>[0,1,2,8,9,10,12].includes(i)).map(d=>`<p><b>${d.hotel}</b><br><a target="_blank" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(d.address)}">${d.address}</a></p>`).join('')}</div><div class="card"><h3>📍 Snabba sökningar</h3><div class="route-buttons"><a class="btn light" target="_blank" href="https://www.google.com/maps/search/badplats+n%C3%A4ra+Sirmione">Bad Sirmione</a><a class="btn light" target="_blank" href="https://www.google.com/maps/search/restaurang+n%C3%A4ra+Via+Giovanni+da+Verrazzano+15+Sirmione">Restaurang nära boendet</a><a class="btn light" target="_blank" href="https://www.google.com/maps/search/parkering+Sirmione">Parkering Sirmione</a><a class="btn light" target="_blank" href="https://www.google.com/maps/search/lavanderia+self+service+Sirmione">Tvättomat</a></div></div></div>`;
 document.getElementById('budget').innerHTML=`<div class="card"><h2>💰 Budget</h2><p class="small">Skriv in kostnader under resan. Sparas lokalt på telefonen.</p><div id="moneyRows"></div><button class="btn" onclick="addMoneyRow()">+ Lägg till kostnad</button><h3>Totalt: <span id="moneyTotal">0</span> kr</h3></div>`;
 document.getElementById('dagbok').innerHTML=`<div class="card"><h2>📸 Resedagbok</h2><p>Skriv några rader varje kväll. Bilder kan ni lägga i telefonens album, men här sparas dagens höjdpunkter.</p></div>`+itinerary.map((d,i)=>`<div class="card"><h3>${d.date} – ${d.route}</h3><textarea class="note" data-note="note-${i}" placeholder="Bäst idag, roligaste stoppet, bästa glassen, kostnad, minne..."></textarea></div>`).join('');
 loadState(); renderMoney();
}
function showTab(id,btn){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active',b.textContent.includes(tabs.find(t=>t[0]===id)[1].split(' ')[1])));window.scrollTo({top:0,behavior:'smooth'}); if(id==='budget') renderMoney();}
function loadState(){document.querySelectorAll('.check input').forEach(cb=>{cb.checked=localStorage.getItem('ck-'+cb.id)==='1';cb.closest('.check').classList.toggle('done',cb.checked);cb.onchange=()=>{localStorage.setItem('ck-'+cb.id,cb.checked?'1':'0');cb.closest('.check').classList.toggle('done',cb.checked);updateProgress();};});document.querySelectorAll('textarea[data-note]').forEach(t=>{t.value=localStorage.getItem(t.dataset.note)||'';t.oninput=()=>localStorage.setItem(t.dataset.note,t.value)});const mi=document.getElementById('mapInput'); if(mi){mi.value=localStorage.getItem('mapLink')||defaultMyMaps;mi.oninput=()=>{localStorage.setItem('mapLink',mi.value);setMapLink(mi.value);};setMapLink(mi.value)}updateProgress();}
function setMapLink(v){const a=document.getElementById('mapOpen'); if(!a)return; a.href=v||'https://www.google.com/maps'; a.style.opacity=v?1:.65;}
function updateProgress(){const boxes=[...document.querySelectorAll('.check input')];const done=boxes.filter(b=>b.checked).length;const pct=boxes.length?Math.round(done/boxes.length*100):0;const bar=document.getElementById('totalBar'),txt=document.getElementById('totalText'); if(bar)bar.style.width=pct+'%'; if(txt)txt.textContent=`${done} av ${boxes.length}`;}
function resetDone(){if(confirm('Nollställa alla avbockningar?')){Object.keys(localStorage).filter(k=>k.startsWith('ck-')).forEach(k=>localStorage.removeItem(k));render();toast('Avbockningar nollställda');}}
function setToday(i){localStorage.setItem('todayIndex',i);const d=itinerary[i];document.getElementById('todayRoute').textContent=d.route;document.getElementById('todayMeta').innerHTML=`<span class="pill dark">${d.date}</span><span class="pill dark">${d.km}</span><span class="pill dark">${d.time}</span>`;toast('Dagens etapp uppdaterad');}
function copyLink(){navigator.clipboard?.writeText(GH_PAGES_URL);toast('Länk kopierad');}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1600)}
function getMoney(){try{return JSON.parse(localStorage.getItem('moneyRows')||'[]')}catch{return[]}}
function saveMoney(rows){localStorage.setItem('moneyRows',JSON.stringify(rows));}
function addMoneyRow(){const rows=getMoney();rows.push({name:'',amount:''});saveMoney(rows);renderMoney();}
function delMoney(i){const rows=getMoney();rows.splice(i,1);saveMoney(rows);renderMoney();}
function renderMoney(){const wrap=document.getElementById('moneyRows'); if(!wrap)return;let rows=getMoney(); if(rows.length===0){rows=[{name:'Diesel',amount:''},{name:'Mat',amount:''},{name:'Glass',amount:''},{name:'Parkering/tull',amount:''}];saveMoney(rows)}wrap.innerHTML=rows.map((r,i)=>`<div class="money-row"><input placeholder="Kostnad" value="${escapeHtml(r.name||'')}" oninput="moneyEdit(${i},'name',this.value)"><input type="number" placeholder="kr" value="${escapeHtml(r.amount||'')}" oninput="moneyEdit(${i},'amount',this.value)"><button class="btn light" onclick="delMoney(${i})">×</button></div>`).join('');updateMoneyTotal();}
function moneyEdit(i,k,v){const rows=getMoney();rows[i][k]=v;saveMoney(rows);updateMoneyTotal();}
function updateMoneyTotal(){const total=getMoney().reduce((s,r)=>s+(Number(r.amount)||0),0);const el=document.getElementById('moneyTotal');if(el)el.textContent=total.toLocaleString('sv-SE');}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}render();const ti=Number(localStorage.getItem('todayIndex')||0);if(itinerary[ti])setToday(ti);
</script>
</body>
</html>
