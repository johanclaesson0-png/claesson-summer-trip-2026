function $(id){return document.getElementById(id)}
function slug(s){return String(s).toLowerCase().replace(/[^a-z0-9åäö]+/gi,'-')}
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function mapsSearch(q){return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(q)}
function routeMap(d){return 'https://www.google.com/maps/dir/?api=1&origin='+encodeURIComponent(d.from)+'&destination='+encodeURIComponent(d.to)}
function checklist(key,items){return items.map((text,i)=>{const id=slug(key)+'-'+i;return `<div class="check" data-id="${id}"><input type="checkbox" id="${id}"><label for="${id}">${esc(text)}</label></div>`}).join('')}
function initNav(){
  $('quickNav').innerHTML=tabs.map(([id,label],i)=>`<button class="${i?'':'active'}" onclick="showTab('${id}')">${label}</button>`).join('');
  $('bottomNav').innerHTML=bottomTabs.map(([id,icon,label],i)=>`<button class="${i?'':'active'}" onclick="showTab('${id}')"><span>${icon}</span>${label}</button>`).join('');
}
function currentTripIndex(){
  const today=new Date(); let idx=itinerary.findIndex(d=>d.iso===today.toISOString().slice(0,10));
  if(idx>=0)return idx;
  if(today<TRIP_START)return 0;
  if(today>TRIP_END)return itinerary.length-1;
  let best=0; itinerary.forEach((d,i)=>{ if(new Date(d.iso+'T00:00:00+02:00')<=today) best=i; }); return best;
}
function renderHero(){const i=Number(localStorage.getItem('todayIndex') ?? currentTripIndex()); setToday(i,false); updateCountdown();}
function setToday(i,notify=true){if(!itinerary[i])return; localStorage.setItem('todayIndex',i); const d=itinerary[i]; $('heroRoute').textContent=d.route; $('heroMeta').innerHTML=`<span class="heroPill">${d.date}</span><span class="heroPill">${d.km}</span><span class="heroPill">${d.time}</span>`; document.querySelectorAll('.day').forEach(el=>el.classList.toggle('today',Number(el.dataset.index)===i)); if(notify)toast('Dagens etapp uppdaterad');}
function updateCountdown(){const now=new Date(); let n,t,m='Planeringsläge'; if(now<TRIP_START){n=Math.ceil((TRIP_START-now)/86400000); t=n===1?'dag till avresa':'dagar till avresa'}else if(now<=TRIP_END){n=Math.max(1,Math.ceil((TRIP_END-now)/86400000)); t=n===1?'dag kvar av resan':'dagar kvar av resan'; m='Reseläge'}else{n='✓';t='resan är klar';m='Minnen & dagbok'} $('countdownNum').textContent=n; $('countdownText').textContent=t; $('tripMode').textContent=m;}

function loadState(){document.querySelectorAll('.check input').forEach(cb=>{cb.checked=localStorage.getItem('ck-'+cb.id)==='1';cb.closest('.check').classList.toggle('done',cb.checked);cb.onchange=()=>{localStorage.setItem('ck-'+cb.id,cb.checked?'1':'0');cb.closest('.check').classList.toggle('done',cb.checked);updateProgress();};});document.querySelectorAll('textarea[data-note]').forEach(t=>{t.value=localStorage.getItem(t.dataset.note)||'';t.oninput=()=>localStorage.setItem(t.dataset.note,t.value)});const mi=$('mapInput'); if(mi){mi.value=localStorage.getItem('mapLink')||'';mi.oninput=()=>{localStorage.setItem('mapLink',mi.value);setMapLink(mi.value);};setMapLink(mi.value)}updateProgress();}
function updateProgress(){const boxes=[...document.querySelectorAll('.check input')];const done=boxes.filter(b=>b.checked).length;const pct=boxes.length?Math.round(done/boxes.length*100):0;const bar=$('totalBar'),txt=$('totalText'); if(bar)bar.style.width=pct+'%'; if(txt)txt.textContent=`${done} av ${boxes.length}`;}
function expandAll(tabId,open){document.querySelectorAll(`#${tabId} details`).forEach(d=>d.open=open)}
function setMapLink(v){const a=$('mapOpen'); if(!a)return; a.href=v||'https://www.google.com/maps'; a.style.opacity=v?1:.65;}
function tryEmbedMap(){const v=(localStorage.getItem('mapLink')||'').trim();const wrap=$('mapEmbedWrap'); if(!v){toast('Klistra in kartlänk först');return;} let src=v; if(v.includes('/maps/d/')) src=v.replace('/edit','/embed'); wrap.innerHTML=`<iframe class="mapFrame" loading="lazy" referrerpolicy="no-referrer-when-downgrade" src="${esc(src)}"></iframe>`;}
function resetDone(){if(confirm('Nollställa alla avbockningar?')){Object.keys(localStorage).filter(k=>k.startsWith('ck-')).forEach(k=>localStorage.removeItem(k));render();toast('Avbockningar nollställda');}}

function getMoney(){try{return JSON.parse(localStorage.getItem('moneyRows')||'[]')}catch{return[]}}

function delMoney(i){const rows=getMoney();rows.splice(i,1);saveMoney(rows);renderMoney();}
function renderMoney(){const wrap=$('moneyRows'); if(!wrap)return;let rows=getMoney(); if(rows.length===0){rows=[{name:'Diesel',amount:''},{name:'Mat',amount:''},{name:'Glass',amount:''},{name:'Parkering/tull',amount:''},{name:'Motorväg/färja',amount:''}];saveMoney(rows)}wrap.innerHTML=rows.map((r,i)=>`<div class="money-row"><input placeholder="Kostnad" value="${esc(r.name||'')}" oninput="moneyEdit(${i},'name',this.value)"><input type="number" inputmode="decimal" placeholder="kr" value="${esc(r.amount||'')}" oninput="moneyEdit(${i},'amount',this.value)"><button class="btn soft small" onclick="delMoney(${i})">×</button></div>`).join('');updateMoneyTotal();}
function moneyEdit(i,k,v){const rows=getMoney();rows[i][k]=v;saveMoney(rows);updateMoneyTotal();}
function updateMoneyTotal(){const total=getMoney().reduce((s,r)=>s+(Number(r.amount)||0),0);const el=$('moneyTotal');if(el)el.textContent=total.toLocaleString('sv-SE');}
function applyTheme(theme){document.documentElement.dataset.theme=theme; localStorage.setItem('theme',theme); $('themeBtn').textContent=theme==='dark'?'☾':theme==='light'?'☀':'◐'}
$('themeBtn').addEventListener('click',()=>{const cur=localStorage.getItem('theme')||'auto'; applyTheme(cur==='auto'?'light':cur==='light'?'dark':'auto'); toast('Tema ändrat');});
async function loadWeather(force){const box=$('weatherNow'); if(!box)return; const d=itinerary[Number(localStorage.getItem('todayIndex') ?? currentTripIndex())]||itinerary[0]; const c=coords[d.to]||coords.Sirmione; const cacheKey='weather-'+d.to; const cached=localStorage.getItem(cacheKey); if(cached&&!force){try{const obj=JSON.parse(cached); if(Date.now()-obj.ts<1800000){box.innerHTML=obj.html; return;}}catch{}}
 box.innerHTML='<div class="skeleton"></div><div class="skeleton" style="width:65%"></div>';
 try{const url=`https://api.open-meteo.com/v1/forecast?latitude=${c[0]}&longitude=${c[1]}&current=temperature_2m,weather_code,wind_speed_10m&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Europe%2FStockholm&forecast_days=3`; const res=await fetch(url); if(!res.ok)throw new Error('weather'); const w=await res.json(); const code=weatherEmoji(w.current.weather_code); const html=`<p><b>${code} ${Math.round(w.current.temperature_2m)}°C i ${d.to}</b><br><span class="small">Vind ${Math.round(w.current.wind_speed_10m)} km/h · kommande dagar ${Math.round(w.daily.temperature_2m_min[0])}–${Math.round(w.daily.temperature_2m_max[0])}°C · regnrisk ${w.daily.precipitation_probability_max[0]??'–'}%</span></p>`; box.innerHTML=html; localStorage.setItem(cacheKey,JSON.stringify({ts:Date.now(),html}));}catch(e){box.innerHTML=`<p><b>Väder kunde inte hämtas just nu.</b><br><span class="small">Öppna väderappen och sök på ${d.to}.</span></p>`;}}
function weatherEmoji(code){if(code===0)return'☀️'; if([1,2].includes(code))return'🌤️'; if(code===3)return'☁️'; if(code>=45&&code<60)return'🌫️'; if(code>=60&&code<70)return'🌧️'; if(code>=70&&code<80)return'❄️'; if(code>=80&&code<90)return'🌦️'; if(code>=95)return'⛈️'; return'🌤️'}

function spotifySearch(q){return 'https://open.spotify.com/search/'+encodeURIComponent(q)}
function getSpotifyLinks(){try{return JSON.parse(localStorage.getItem('spotifyLinks')||'[]')}catch{return[]}}
function saveSpotifyLinks(rows){localStorage.setItem('spotifyLinks',JSON.stringify(rows));}
function addSpotifyLink(){const rows=getSpotifyLinks(); rows.push({title:'',url:''}); saveSpotifyLinks(rows); renderSpotifyLinks(); showTab('musik');}
function delSpotifyLink(i){const rows=getSpotifyLinks(); rows.splice(i,1); saveSpotifyLinks(rows); renderSpotifyLinks();}
function spotifyEdit(i,k,v){const rows=getSpotifyLinks(); rows[i][k]=v; saveSpotifyLinks(rows); if(k==='url') renderSpotifyLinks();}
function spotifyEmbedUrl(url){try{const u=new URL(url); if(!u.hostname.includes('spotify.com')) return ''; const parts=u.pathname.split('/').filter(Boolean); if(parts.length<2) return ''; const type=parts[0]; const id=parts[1]; if(!['playlist','album','track','episode','show','artist'].includes(type)) return ''; return `https://open.spotify.com/embed/${type}/${id}?utm_source=generator&theme=0`; }catch{return ''}}
function renderSpotifyLinks(){const wrap=$('spotifyLinks'); if(!wrap)return; const rows=getSpotifyLinks(); if(rows.length===0){wrap.innerHTML='<p class="small">Inga egna Spotify-länkar ännu. Tryck “Lägg till länk” och klistra in en spellista.</p>'; return;} wrap.innerHTML=rows.map((r,i)=>{const embed=spotifyEmbedUrl(r.url||''); return `<div class="miniCard" style="margin-bottom:10px"><input class="field" placeholder="Namn, t.ex. Barnens roadtrip" value="${esc(r.title||'')}" oninput="spotifyEdit(${i},'title',this.value)"><br><br><input class="field" placeholder="Spotify-länk" value="${esc(r.url||'')}" oninput="spotifyEdit(${i},'url',this.value)">${embed?`<div style="margin-top:12px"><iframe class="spotifyFrame" loading="lazy" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" src="${esc(embed)}"></iframe></div>`:''}<div class="actions"><a class="btn soft" target="_blank" rel="noopener" href="${esc(r.url||'https://open.spotify.com')}">Öppna</a><button class="btn soft" onclick="delSpotifyLink(${i})">Ta bort</button></div></div>`}).join('');}
function openDailyMusic(){const i=Number(localStorage.getItem('todayIndex') ?? currentTripIndex()); const d=itinerary[i]||itinerary[0]; const query=d.time.includes('Lugn')?'chill roadtrip':d.to==='Sirmione'?'italian summer':d.to==='Hamburg'?'hamburg roadtrip':d.km.includes('0')?'family summer':'roadtrip hits'; window.open(spotifySearch(query),'_blank','noopener');}



function csvParse(text){
  const rows=[]; let row=[], cur='', q=false;
  for(let i=0;i<text.length;i++){
    const ch=text[i], next=text[i+1];
    if(ch==='"'){
      if(q && next==='"'){cur+='"'; i++;}
      else q=!q;
    } else if(ch===',' && !q){row.push(cur); cur='';}
    else if((ch==='\n' || ch==='\r') && !q){
      if(ch==='\r' && next==='\n') i++;
      row.push(cur); cur='';
      if(row.some(c=>String(c).trim()!=='')) rows.push(row);
      row=[];
    } else cur+=ch;
  }
  row.push(cur); if(row.some(c=>String(c).trim()!=='')) rows.push(row);
  return rows;
}
function normalizeKey(s){return String(s||'').toLowerCase().replace(/\s+/g,' ').trim();}
function getCol(headers, tests){
  const low=headers.map(normalizeKey);
  for(const t of tests){const i=low.findIndex(h=>h.includes(t)); if(i>=0)return i;}
  return -1;
}
function mapIdeaRows(rows){
  if(rows.length<2)return [];
  const h=rows[0];
  const idx={
    time:getCol(h,['tidsstämpel','timestamp']),
    name:getCol(h,['namn på plats','plats','namn']),
    area:getCol(h,['område','stad']),
    cat:getCol(h,['kategori']),
    by:getCol(h,['tipsad av','tipsare','vem']),
    comment:getCol(h,['kommentar']),
    maps:getCol(h,['google maps','maps','länk']),
    status:getCol(h,['status'])
  };
  return rows.slice(1).map(r=>({
    time:r[idx.time]||'', name:r[idx.name]||'', area:r[idx.area]||'', cat:r[idx.cat]||'Annat', by:r[idx.by]||'', comment:r[idx.comment]||'', maps:r[idx.maps]||'', status:r[idx.status]||'Kanske'
  })).filter(x=>x.name||x.area||x.comment);
}
let ideasCache=[]; let ideaFilter='alla';
function setIdeaFilter(f){ideaFilter=f; renderIdeas();}
async function loadIdeas(force){
  const list=$('ideasList'), status=$('ideasStatus'); if(!list)return;
  const cached=localStorage.getItem('tripIdeasCache');
  if(cached && !force && ideasCache.length===0){try{ideasCache=JSON.parse(cached).items||[];}catch{}}
  if(ideasCache.length && !force){renderIdeas(); return;}
  list.innerHTML='<div class="card"><div class="skeleton"></div><div class="skeleton" style="width:70%"></div></div>';
  if(status)status.textContent='Hämtar idéer från Google Sheet...';
  try{
    const res=await fetch(IDEAS_CSV_URL+'&_=' + Date.now(), {cache:'no-store'});
    if(!res.ok) throw new Error('Kunde inte hämta listan');
    const text=await res.text();
    ideasCache=mapIdeaRows(csvParse(text));
    localStorage.setItem('tripIdeasCache',JSON.stringify({ts:Date.now(),items:ideasCache}));
    renderIdeas();
    toast('Utflyktsidéer uppdaterade');
  }catch(e){
    if(cached){try{ideasCache=JSON.parse(cached).items||[]; renderIdeas(); if(status)status.textContent='Visar sparad lista offline. Kunde inte uppdatera just nu.';}catch{}}
    else {list.innerHTML='<div class="card"><h3>Kunde inte hämta idéer</h3><p class="small">Kontrollera att Google Sheet är delat som “Alla med länken: Läsare”, eller prova igen om en stund.</p></div>'; if(status)status.textContent='Fel vid hämtning.';}
  }
}
function renderIdeas(){
  const list=$('ideasList'), status=$('ideasStatus'); if(!list)return;
  const filtered=ideasCache.filter(x=> ideaFilter==='alla' || [x.cat,x.status,x.area,x.by].some(v=>String(v||'').toLowerCase().includes(ideaFilter.toLowerCase())));
  if(status){const saved=JSON.parse(localStorage.getItem('tripIdeasCache')||'{}'); status.textContent=`${filtered.length} av ${ideasCache.length} idéer visas` + (saved.ts?` · senast hämtad ${new Date(saved.ts).toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'})}`:'');}
  document.querySelectorAll('#ideaFilters button').forEach(b=>b.classList.toggle('soft',!b.textContent.toLowerCase().includes(ideaFilter.toLowerCase()) && !(ideaFilter==='alla' && b.textContent==='Alla')));
  if(filtered.length===0){list.innerHTML='<div class="card"><h3>Inga idéer ännu</h3><p class="small">Tryck “Lägg till idé” för att lägga in första tipset via formuläret.</p></div>'; return;}
  list.innerHTML=filtered.slice().reverse().map(x=>{
    const mapHref=x.maps&&/^https?:\/\//i.test(x.maps)?x.maps:mapsSearch([x.name,x.area].filter(Boolean).join(' '));
    const emoji=ideaEmoji(x.cat);
    return `<div class="ideaCard"><h3>${emoji} ${esc(x.name||'Namnlöst tips')}</h3><div class="ideaMeta"><span class="pill blue">${esc(x.cat||'Annat')}</span><span class="pill orange">${esc(x.status||'Kanske')}</span>${x.area?`<span class="pill">${esc(x.area)}</span>`:''}${x.by?`<span class="pill purple">${esc(x.by)}</span>`:''}</div>${x.comment?`<p>${esc(x.comment)}</p>`:''}<div class="actions"><a class="btn soft" target="_blank" rel="noopener" href="${esc(mapHref)}">Öppna karta</a></div></div>`;
  }).join('');
}
function ideaEmoji(cat){cat=String(cat||'').toLowerCase(); if(cat.includes('bad'))return'🏖️'; if(cat.includes('restaurang')||cat.includes('mat'))return'🍕'; if(cat.includes('barn'))return'🧒'; if(cat.includes('regn'))return'🌧️'; if(cat.includes('shopping'))return'🛍️'; if(cat.includes('parkering'))return'🅿️'; return'📍';}

function exportTripData(){const data={version:APP_VERSION,exported:new Date().toISOString(),money:getMoney(),notes:Object.fromEntries(Object.keys(localStorage).filter(k=>k.startsWith('note-')).map(k=>[k,localStorage.getItem(k)])),checks:Object.fromEntries(Object.keys(localStorage).filter(k=>k.startsWith('ck-')).map(k=>[k,localStorage.getItem(k)]))}; const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='claesson-trip-backup.json'; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000);}
